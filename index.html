<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jim Steven Espelico — Business Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f0f;
            padding: 20px;
        }

        .card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(0, 217, 255, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff, #0066ff);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -1px;
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .title {
            font-size: 14px;
            font-weight: 400;
            color: #00d9ff;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin-bottom: 24px;
        }

        .info-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .info-list li {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .info-list .icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .info-list .icon svg {
            width: 16px;
            height: 16px;
            fill: #00d9ff;
        }

        .info-list a, .info-list span {
            color: #b0b8c8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.2s;
        }

        .info-list a:hover {
            color: #00d9ff;
        }

        .social-links {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .social-links a {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .social-links a:hover {
            background: rgba(0, 217, 255, 0.1);
            border-color: rgba(0, 217, 255, 0.3);
            transform: translateY(-2px);
        }

        .social-links a svg {
            width: 18px;
            height: 18px;
            fill: #8892a4;
            transition: fill 0.2s;
        }

        .social-links a:hover svg {
            fill: #00d9ff;
        }

        .qr-section {
            text-align: center;
            padding-top: 8px;
        }

        .qr-label {
            font-size: 11px;
            color: #5a6272;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        .qr-code {
            background: #ffffff;
            border-radius: 12px;
            padding: 12px;
            display: inline-block;
        }

        .qr-code canvas {
            display: block;
        }

        .save-btn {
            display: block;
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #00d9ff, #0066ff);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            letter-spacing: 0.3px;
        }

        .save-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .save-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar">JS</div>
    <div class="name">Jim Steven Espelico</div>
    <div class="title">Software Engineer</div>

    <div class="divider"></div>

        <li>

        </li>
        <li>

            <a href="https://github.com/jimsteven" target="_blank">github.com/jimsteven</a>

    <div class="social-links">
        <a href="https://github.com/jimsteven" target="_blank" title="GitHub">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
        </a>
        <a href="https://linkedin.com/in/jimstevenespelico" target="_blank" title="LinkedIn">
            <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </a>
    </div>

    <div class="qr-section">
        <div class="qr-label">Scan to view this card</div>
        <div class="qr-code">
            <canvas id="qrCanvas"></canvas>
        </div>
    </div>

    <button class="save-btn" onclick="saveContact()">Save Contact (vCard)</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
    // Generate QR code pointing to this page's live URL
    const pageUrl = window.location.href;
    QRCode.toCanvas(document.getElementById('qrCanvas'), pageUrl, {
        width: 160,
        margin: 0,
        color: { dark: '#1a1a2e', light: '#ffffff' }
    });

    function saveContact() {
        const vcard = [
            'BEGIN:VCARD',
            'VERSION:3.0',
            'FN:Jim Steven Espelico',
            'N:Espelico;Jim Steven;;;',
            'EMAIL:jimstevenespelico@gmail.com',
            'URL:https://github.com/jimsteven',
            'ADR:;;San Francisco;CA;;US',
            'TITLE:Software Engineer',
            'END:VCARD'
        ].join('\n');

        const blob = new Blob([vcard], { type: 'text/vcard' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'jim_steven_espelico.vcf';
        a.click();
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
