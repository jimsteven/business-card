<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jim Steven Espelico — Business Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f0f;
            padding: 20px;
        }

        .card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(0, 217, 255, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff, #0066ff);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -1px;
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 28px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin-bottom: 24px;
        }

        .info-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .info-list li {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .info-list .icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .info-list .icon svg {
            width: 16px;
            height: 16px;
            fill: #00d9ff;
        }

        .info-list a, .info-list span {
            color: #b0b8c8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.2s;
        }

        .info-list a:hover {
            color: #00d9ff;
        }

        .qr-section {
            text-align: center;
            padding-top: 8px;
        }

        .qr-label {
            font-size: 11px;
            color: #5a6272;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        .qr-code {
            background: #ffffff;
            border-radius: 12px;
            padding: 12px;
            display: inline-block;
        }

        .qr-code canvas {
            display: block;
        }

        .save-btn {
            display: block;
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #00d9ff, #0066ff);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            letter-spacing: 0.3px;
        }

        .save-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .save-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar">JS</div>
    <div class="name">Jim Steven Espelico</div>

    <div class="divider"></div>

    <ul class="info-list">
        <li>
            <div class="icon">
                <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            </div>
            <a href="tel:09669875456">09669875456</a>
        </li>
        <li>
            <div class="icon">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            </div>
            <a href="mailto:jim@ampcode.com">jim@ampcode.com</a>
        </li>
        <li>
            <div class="icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            </div>
            <a href="https://ampcode.com" target="_blank">ampcode.com</a>
        </li>
    </ul>

    <div class="qr-section">
        <div class="qr-label">Scan to view this card</div>
        <div class="qr-code">
            <canvas id="qrCanvas"></canvas>
        </div>
    </div>

    <button class="save-btn" onclick="saveContact()">Save Contact (vCard)</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
    const pageUrl = window.location.href;
    QRCode.toCanvas(document.getElementById('qrCanvas'), pageUrl, {
        width: 160,
        margin: 0,
        color: { dark: '#1a1a2e', light: '#ffffff' }
    });

    function saveContact() {
        const vcard = [
            'BEGIN:VCARD',
            'VERSION:3.0',
            'FN:Jim Steven Espelico',
            'N:Espelico;Jim Steven;;;',
            'TEL:09669875456',
            'EMAIL:jim@ampcode.com',
            'URL:https://ampcode.com',
            'TITLE:Software Engineer',
            'END:VCARD'
        ].join('\n');

        const blob = new Blob([vcard], { type: 'text/vcard' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'jim_steven_espelico.vcf';
        a.click();
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
